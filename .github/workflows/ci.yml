name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck and lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Paper search contracts
        run: pnpm run test:discovered-source-upload && pnpm run test:studio-nav-side-effects

      - name: Notebook home usability contract
        run: pnpm run test:notebook-home-usability

      - name: Deep research contracts
        run: pnpm run test:deep-research-contract

      - name: Hypothesis generation contracts
        run: pnpm run test:hypothesis-generation-contract

      - name: Data processing contracts
        run: pnpm run test:data-processing-plan

      - name: Experiment design contracts
        run: pnpm run test:experiment-design-contract

      - name: Academic writing contracts
        run: pnpm run test:academic-writing-contract

      - name: Text polishing contracts
        run: pnpm run test:text-polishing-contract

      - name: Peer review contracts
        run: pnpm run test:peer-review-contract

      - name: Scientific illustration contracts
        run: pnpm run test:scientific-illustration-contract

      - name: Cross-app authentication contract
        run: pnpm run test:cross-app-auth-contract

      - name: Unified client request contract
        run: pnpm run test:client-request-contract

      - name: Loopback listener contract
        run: pnpm run test:loopback-listener-contract

      - name: Request observability contract
        run: pnpm run test:request-observability

      - name: Grounded operational observability contract
        run: pnpm run test:grounded-operational-observability

      - name: Grounded task lifecycle contract
        run: pnpm run test:grounded-task-lifecycle

      - name: Architecture ownership guard
        run: ARCH_GUARD_STRICT=true pnpm run check:architecture

      - name: Code size report
        run: pnpm run check:code-size

      - name: Service metrics contract
        run: pnpm run test:service-metrics

      - name: Long-task admission contract
        run: pnpm run test:long-task-admission

      - name: Release environment gate
        run: pnpm run test:release-env-gate

      - name: Typecheck
        run: pnpm run ts-check

      - name: Lint
        run: pnpm run lint:build
